deterministic=true
minNodeCount=40
minEdgeCount=100
actionCount=4
propositionCount=8
initialCondition=p0
goalCondition=p1 and not p0 and not p2 and not p3 and not p4 and not p5 and not p6
initialStateCount=3
goalStateCount=2
witnessCount=3
minWitnessActionCount=5
seed=2

# Optional. If omitted, outputs are written next to this config file
# using the same base name with .dot and .txt.
dotOutput=generator-output.dot
witnessOutput=generator-witnesses.txt
